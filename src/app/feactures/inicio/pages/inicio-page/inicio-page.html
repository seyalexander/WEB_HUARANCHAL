<section (mousemove)="onMouseMove($event)"
  (mouseleave)="onMouseLeave()" class="relative min-h-screen overflow-hidden flex items-center custom-hero">

  <!-- Fondo -->
  <img [style.transform]="
    'scale(1.1) translate(' +
    mouseX +
    'px,' +
    mouseY +
    'px)'
  " src="assets/CTA-IMG.jpg" alt="Huaranchal" class="absolute inset-0 w-full h-full object-cover">

  <!-- Overlay cinematográfico -->
  <div class="absolute inset-0
           bg-linear-to-r
           from-black/85
           via-black/60
           to-black/20">
  </div>




  <!-- Contenido -->
  <div class="relative z-10
           max-w-7xl mx-auto
           px-6 lg:px-12
           w-full">

    <div class="grid lg:grid-cols-2 gap-12 items-center">

      <!-- IZQUIERDA -->
      <div>

        <h1 class="mt-8
                 text-5xl
                 md:text-4xl
                 lg:text-4xl
                 font-black
                 leading-none
                 text-white">

          Descubre la magia de

          <span class="block  lg:text-8xl mt-3 text-[#F6C445]">

            Huaranchal

          </span>

        </h1>

        <p class="mt-8
                 text-lg md:text-xl
                 text-white
                 max-w-xl
                 leading-relaxed">

          Explora cataratas escondidas,
          aguas termales naturales y
          paisajes únicos en el corazón
          del Alto Chicama.

        </p>

        <div class="mt-10 flex flex-wrap gap-4">

          <button [routerLink]="'/Lugares'" class="px-8 py-4 rounded-xl
                   w-full
                   lg:w-auto
                   bg-[#F28C28]
                   hover:bg-[#E67E22]
                   text-white
                   font-semibold
                   shadow-2xl
                   hover:scale-105
                   transition-all">

            Explorar destinos

          </button>

          <button class="px-8 py-4 rounded-xl
                   border border-white/20
                   bg-white/10
                   w-full
                   lg:w-auto
                   backdrop-blur-md
                   text-white
                   hover:bg-white/20
                   transition-all">

            Cómo llegar

          </button>

        </div>

        <!-- Mini Stats -->
        <div class="mt-12 flex flex-wrap gap-8">

          <div>
            <h3 class="text-4xl font-bold text-[#F6C445]">

              4+

            </h3>

            <p class="text-slate-300">

              Destinos

            </p>
          </div>

          <div>
            <h3 class="text-4xl font-bold text-[#F6C445]">

              2500m

            </h3>

            <p class="text-slate-300">

              Altitud

            </p>
          </div>

          <div>
            <h3 class="text-4xl font-bold text-[#F6C445]">

              365

            </h3>

            <p class="text-slate-300">

              Días al año

            </p>
          </div>

        </div>

      </div>



    </div>

  </div>

    @if(mostrarBrillo){

<div
  class="mouse-light"
  [style.left.px]="cursorX"
  [style.top.px]="cursorY">
</div>

}

  <!-- Gradiente inferior -->
  <div class="absolute bottom-0 left-0 right-0
           h-40
           bg-linear-to-t
           from-slate-950
           to-transparent">
  </div>

 

</section>

<app-que-conoceras-inicio-components />

<app-productos-emblematicos-inicio-components />

<app-cta-inicio-components />

<app-footer-inicio-components />

@if(showScrollTop){
<button (click)="scrollToTop()" class="fixed bottom-6 right-6 z-50 w-14 h-14 flex items-center justify-center
         bg-orange-500 hover:bg-orange-600 rounded-full shadow-2xl
         transition-all duration-300 hover:scale-110">
  ↑
</button>
}
