
<section
class="relative min-h-screen flex items-center justify-center overflow-hidden">

    <img
        alt="Imagen"
        src="assets/CTA-IMG.jpg"
        class="absolute inset-0 w-full h-full object-cover">

    <div class="absolute inset-0 bg-black/50"></div>

    <div class="relative z-10 max-w-5xl mx-auto px-6 text-center">

        <span
            class="inline-flex px-5 py-2 rounded-full bg-white/20 backdrop-blur-md text-white">

            Provincia de Otuzco · La Libertad

        </span>

        <h1
            class="mt-8 text-5xl md:text-7xl font-extrabold text-white leading-tight">

            Descubre la magia de
            <span class="text-[#F6C445]">
                Huaranchal
            </span>

        </h1>

        <p
            class="mt-6 text-xl text-slate-200 max-w-3xl mx-auto">

            Cataratas, baños termales, paisajes naturales,
            cultura viva y los sabores auténticos del Alto Chicama.

        </p>

        <div class="mt-10 flex justify-center">

            <button
                class="px-10 py-4 rounded-xl bg-[#F28C28] hover:bg-[#e07b18] text-white font-semibold transition">

                Explorar destinos

            </button>

        </div>

    </div>

</section>

<app-que-conoceras-inicio-components />

<app-productos-emblematicos-inicio-components />

<app-cta-inicio-components />

<app-footer-inicio-components />

@if(showScrollTop){
    <button (click)="scrollToTop()"
  class="fixed bottom-6 right-6 z-50 w-14 h-14 flex items-center justify-center
         bg-orange-500 hover:bg-orange-600 rounded-full shadow-2xl
         transition-all duration-300 hover:scale-110">
↑
</button>
}
