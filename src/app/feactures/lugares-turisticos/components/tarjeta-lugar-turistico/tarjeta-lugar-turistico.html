<div class="grid lg:grid-cols-3 md:grid-cols-2 gap-8 mt-20">
    @for (item of items; track $index) {
        <a class="group relative h-125 rounded-4xl overflow-hidden shadow-2xl" [routerLink]="item.routerLink" (mouseenter)="onHoverCard()"
  (mouseleave)="onLeaveCard()">
        <img alt="Imagen catarata" [src]="item.imagen"
            class="absolute inset-0 w-full h-full object-cover transition duration-700 group-hover:scale-110">

        <div class="absolute inset-0 bg-linear-to-t from-black via-black/20 to-transparent">
        </div>

        <div class="absolute bottom-0 p-8 text-white">

            <span class="px-4 py-2 rounded-full bg-white/20 backdrop-blur-md text-sm">
                {{item.titleH3}}
            </span>

            <h3 class="mt-4 text-3xl font-bold">
                {{item.titleH1}}
            </h3>

            <p class="mt-3 text-white/80">
                {{item.descripcion}}
            </p>

            <div class="mt-6 flex items-center gap-2 font-semibold">
                Ver destino →
            </div>

            <div class="absolute bottom-0 left-0 w-full h-[3px] bg-white/10">
            <div class="h-full w-0 group-hover:w-full transition-all duration-700 bg-[#F28C28]"></div>
          </div>
        </div>

    </a>
    }
    
</div>

<!-- PERSONAJE TURISTA (solo desktop) -->

<div
  class="hidden lg:block fixed -left-10 top-0 h-screen -z-10 pointer-events-none transition-all duration-500"
  [class.opacity-0]="!showTraveler"
  [class.opacity-100]="showTraveler"
>

  <!-- Imagen -->
  <img
  src="assets/NATURALEZA-IMG.jpeg"
  alt="Turista"
  class="w-full h-screen drop-shadow-2xl opacity-80
  [mask-image:linear-gradient(to_right,black_50%,transparent_100%)]
  [-webkit-mask-image:linear-gradient(to_right,black_50%,transparent_100%)]"
/>

</div>

<div
  class="hidden lg:block fixed -right-10 -bottom-12 w-105 z-50  pointer-events-none transition-all duration-500"
  [class.opacity-0]="!showTraveler"
  [class.opacity-100]="showTraveler">

  <img
    src="assets/turista_01.png"
    alt="Turista"
    class="w-full h-auto drop-shadow-2xl" />

</div>
