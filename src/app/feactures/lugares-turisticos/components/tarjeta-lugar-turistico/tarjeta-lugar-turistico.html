<div class="grid lg:grid-cols-3 md:grid-cols-2 gap-8 mt-20">
    @for (item of items; track $index) {
        <a class="group relative h-125 rounded-4xl overflow-hidden shadow-2xl" [routerLink]="item.routerLink">
        <img alt="Imagen catarata" [src]="item.imagen"
            class="absolute inset-0 w-full h-full object-cover transition duration-700 group-hover:scale-110">

        <div class="absolute inset-0 bg-linear-to-t from-black via-black/20 to-transparent">
        </div>

        <div class="absolute bottom-0 p-8 text-white">

            <span class="px-4 py-2 rounded-full bg-white/20 backdrop-blur-md text-sm">
                {{item.titleH3}}
            </span>

            <h3 class="mt-4 text-3xl font-bold">
                {{item.titleH1}}
            </h3>

            <p class="mt-3 text-white/80">
                {{item.descripcion}}
            </p>

            <div class="mt-6 flex items-center gap-2 font-semibold">
                Ver destino →
            </div>

        </div>

    </a>
    }
    
</div>
