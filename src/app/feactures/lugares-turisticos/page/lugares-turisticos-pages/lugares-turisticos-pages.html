<section
    id="lugares"
    class="relative py-32 overflow-hidden bg-[#FAFAF7]">

    <!-- Fondo -->

    <div
        class="absolute top-0 left-0 w-150 h-150 bg-[#A4C639]/10 rounded-full blur-3xl">
    </div>

    <div
        class="absolute bottom-0 right-0 w-150 h-150 bg-[#F28C28]/10 rounded-full blur-3xl">
    </div>

    <div
        class="relative z-10 max-w-7xl mx-auto px-6">

        <div class="text-center">

            <span
                class="inline-flex px-5 py-2 rounded-full bg-[#2F5D34]/10 text-[#2F5D34]">

                Destinos Turísticos

            </span>

            <h2
                class="mt-6 text-5xl font-extrabold text-slate-800">

                Explora Huaranchal

            </h2>

            <p
                class="mt-4 text-slate-600 max-w-3xl mx-auto">

                Descubre cada uno de los lugares que convierten
                a Huaranchal en uno de los destinos más atractivos
                de la provincia de Otuzco.

            </p>

        </div>

        <!-- Grid -->
        <app-tarjeta-lugar-turistico  [items]="items"/>
        
    </div>

</section>
