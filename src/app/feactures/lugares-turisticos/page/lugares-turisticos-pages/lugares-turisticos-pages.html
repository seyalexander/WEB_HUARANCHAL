<section
  id="lugares"
  class="relative min-h-screen py-28 overflow-hidden bg-[#FAFAF7]">

  <!-- CAPA 1: GRADIENTE NATURAL BASE -->
  <div class="absolute inset-0 bg-gradient-to-b from-[#F8F9F4] via-[#FAFAF7] to-[#F3F4EE]"></div>

  <!-- CAPA 2: TOPOGRAFÍA ABSTRACTA (MUY SUAVE) -->
  <div class="absolute inset-0 opacity-[0.06] pointer-events-none">
    <svg class="w-full h-full" viewBox="0 0 1440 600" preserveAspectRatio="none">

      <path
        d="M0,420 C150,380 300,460 450,420 C600,380 750,340 900,380 C1050,420 1200,480 1440,420"
        fill="none"
        stroke="#2F5D34"
        stroke-width="2"
      />

      <path
        d="M0,300 C200,260 400,340 600,300 C800,260 1000,220 1200,260 C1320,280 1380,320 1440,300"
        fill="none"
        stroke="#F28C28"
        stroke-width="2"
      />

    </svg>
  </div>

  <!-- CAPA 3: PUNTOS DE EXPLORACIÓN (tipo mapa turístico moderno) -->
  <div class="absolute inset-0 opacity-[0.05] pointer-events-none
              bg-[radial-gradient(#2F5D34_1px,transparent_1px)]
              [background-size:26px_26px]">
  </div>

  <!-- CAPA 4: LUZ DIRECCIONAL (sensación de “destino”) -->
  <div class="absolute -top-40 left-1/2 -translate-x-1/2 w-[700px] h-[700px] bg-[#F6C445]/10 rounded-full blur-[180px]"></div>

  <!-- CONTENIDO -->
  <div class="relative z-10 max-w-6xl mx-auto px-6">

    <!-- HEADER -->
    <div class="text-center">

      <span
        class="inline-flex px-5 py-2 rounded-full bg-[#2F5D34]/10 text-[#2F5D34] text-sm font-medium border border-[#2F5D34]/15">
        Destinos Turísticos
      </span>

      <h2 class="mt-6 text-4xl md:text-5xl font-extrabold tracking-tight text-slate-800">
        Explora <span class="text-[#2F5D34]">Huaranchal</span>
      </h2>

      <p class="mt-5 text-slate-600 max-w-2xl mx-auto text-lg leading-relaxed">
        Descubre cada uno de los lugares que convierten a Huaranchal en uno de los destinos más atractivos de la provincia de Otuzco.
      </p>

    </div>

    <!-- SEPARADOR -->
    <div class="mt-10 flex justify-center">
      <div class="w-28 h-[2px] bg-gradient-to-r from-transparent via-[#F28C28] to-transparent"></div>
    </div>

    <!-- TARJETAS -->
    <div class="mt-16">
      <app-tarjeta-lugar-turistico [items]="items" />
    </div>

  </div>
</section>
