<section (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()"
    class="relative w-full min-h-screen flex flex-col items-center justify-center px-6 overflow-hidden text-white">

    <!-- BACKGROUND -->
    <div class="absolute inset-0 bg-linear-to-b from-black via-[#0b0b0f] to-black"></div>


    <!-- @if(mostrarBrillo){

    <div class="mouse-light" [style.left.px]="cursorX" [style.top.px]="cursorY" [style.background]="brilloColor"
        *ngIf="mostrarBrillo">
    </div>

    } -->

    <!-- IMÁGENES DIFUMINADAS LATERALES -->
    <img alt="Imagen" src="assets/huaranchal-hero.jpg" (mouseenter)="setBrillo('rgba(59, 130, 246, 0.35)')"
        (mouseleave)="resetBrillo()" class="absolute -left-20 top-20 w-137.5 z-20 opacity-10 rotate-12 pointer-events-auto
  [mask-image:radial-gradient(circle,black_40%,transparent_75%)]
  [-webkit-mask-image:radial-gradient(circle,black_40%,transparent_75%)]" />

    <img alt="Imagen" src="assets/turista_01.png" (mouseenter)="setBrillo('rgba(34, 197, 94, 0.35)')"
        (mouseleave)="resetBrillo()" class="absolute -right-20 bottom-10 w-137.5 z-20 opacity-20 -rotate-12 pointer-events-auto
  [mask-image:radial-gradient(circle,black_40%,transparent_75%)]
  [-webkit-mask-image:radial-gradient(circle,black_40%,transparent_75%)]" />

    <!-- LUCES -->
    <div class="absolute top-1/3 w-[450px] h-[450px] bg-orange-500/10 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-blue-500/10 blur-[120px] rounded-full"></div>

    <!-- PERFIL ACTIVO -->
    <div class="relative z-10 text-center mb-2">

        <img [src]="activeMember.image"
            class="w-54 h-54 mx-auto rounded-full object-cover shadow-2xl border border-white/10 hover:scale-105 transition" />

        <h2 class="text-3xl font-bold mt-4">{{ activeMember.name }}</h2>
        <p class="text-orange-400 font-semibold">{{ activeMember.role }}</p>

        <p class="text-sm mt-3 opacity-70 max-w-md mx-auto">
            {{ activeMember.description }}
        </p>

    </div>

    <!-- EQUIPO -->
    <div class="relative z-10 w-full max-w-5xl h-[300px]">

        <div *ngFor="let m of others; let i = index" (click)="setActive(m.id)" class="absolute cursor-pointer group"
            [ngStyle]="getFanPosition(i, others.length)">

            <div class="relative w-24 h-24 rounded-full flex items-center justify-center
         border border-white/10 shadow-lg">

                <!-- Avatar normal -->
                <img alt="Imagen" [src]="m.image" class="absolute inset-0 w-full h-full rounded-full object-cover
           transition-all duration-500
           group-hover:opacity-0" />

                <!-- Persona completa -->
                <img
  alt="Imagen"
  [src]="m.imageHover"
  class="absolute bottom-0 left-1/2
         w-36 max-w-none
         -translate-x-1/2
         opacity-0 scale-80
         transition-all duration-500
         group-hover:opacity-100
         group-hover:scale-100
         group-hover:-translate-y-4
         pointer-events-none

         [mask-image:linear-gradient(to_top,transparent_0%,black_20%,black_100%)]
         [-webkit-mask-image:linear-gradient(to_top,transparent_0%,black_20%,black_100%)]

         drop-shadow-[0_0_20px_rgba(255,255,255,0.15)]"
/>

            </div>

            <p class="text-xs mt-2 text-center opacity-70 group-hover:opacity-100 transition">
                {{ m.name }}
            </p>
            <p class="text-xs mt-2 text-center opacity-70 group-hover:opacity-100 transition">
                {{ m.apellido }}
            </p>

        </div>



    </div>



</section>
