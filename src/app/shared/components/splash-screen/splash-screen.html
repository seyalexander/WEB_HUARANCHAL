<div
  class="fixed inset-0 flex items-center justify-center bg-[#0B0B0F] overflow-hidden"
  [ngClass]="{ 'opacity-0 scale-110 blur-xl': exiting }"
  style="transition: all 1s ease-in-out;"
>

  <!-- AURORA (PROFUNDIDAD REAL) -->
  <div class="absolute inset-0">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2
                w-[900px] h-[900px] bg-[#F6C445]/15 rounded-full blur-[180px]
                animate-[float_12s_ease-in-out_infinite]">
    </div>

    <div class="absolute top-10 left-[-120px]
                w-[600px] h-[600px] bg-white/5 rounded-full blur-[160px]
                animate-[float_14s_ease-in-out_infinite_reverse]">
    </div>

    <div class="absolute bottom-[-150px] right-[-150px]
                w-[700px] h-[700px] bg-[#F6C445]/10 rounded-full blur-[200px]
                animate-[float_16s_ease-in-out_infinite]">
    </div>

  </div>

  <!-- PARTÍCULAS / ATMÓSFERA -->
  <div class="absolute inset-0 opacity-30">
    <div class="w-full h-full
                bg-[radial-gradient(circle_at_center,_rgba(255,255,255,0.06)_1px,_transparent_1px)]
                bg-[length:30px_30px]">
    </div>
  </div>

  <!--  VIGNETTE (EFECTO CINE) -->
  <div class="absolute inset-0
              bg-[radial-gradient(circle,_transparent_40%,_black_100%)] opacity-70">
  </div>

  <!-- CONTENIDO -->
  <div class="relative text-center px-6">

    <h1 class="huaranchal-glow">
  Huaranchal
</h1>

    <!-- SUBTITULO -->
    <p class="mt-4 text-white/70 text-lg
              animate-[fadeUp_1.5s_ease-out_forwards] opacity-0">

      Proyecto cultural interactivo
    </p>

    <p class="mt-2 text-white/40 text-sm
              animate-[fadeUp_1.8s_ease-out_forwards] opacity-0">

      Tradiciones • Vestimenta • Cultura • Identidad
    </p>

    <!-- LINEA -->
    <div class="mt-8 w-40 h-[2px] mx-auto bg-[#F6C445] rounded-full
                animate-[fadeUp_2s_ease-out_forwards] opacity-0">
    </div>

  </div>

</div>
